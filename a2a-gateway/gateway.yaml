# A2A Gateway Configuration

server:
  bind_address: "0.0.0.0:8080"
  enable_websocket: true
  websocket_address: "0.0.0.0:8081"
  request_timeout: "30s"
  max_connections: 1000

discovery:
  strategy:
    type: "Static"
  health_check_interval: "30s"
  health_check_timeout: "5s"
  static_services:
    - name: "reimbursement-agent"
      url: "http://localhost:3001"
      weight: 100
      tags: ["finance", "reimbursement"]
      metadata:
        env: "development"
        version: "1.0.0"

load_balancing:
  strategy: "RoundRobin"
  health_check:
    interval: "30s"
    timeout: "5s"
    failure_threshold: 3
    success_threshold: 2

auth:
  enabled: false
  strategies: []

monitoring:
  metrics:
    enabled: true
    bind_address: "0.0.0.0:9090"
    path: "/metrics"
  tracing:
    enabled: false
    jaeger_endpoint: null
    service_name: "a2a-gateway"

logging:
  level: "info"
  format: "text"
