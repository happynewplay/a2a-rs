# A2A Gateway Configuration Example

server:
  bind_address: "0.0.0.0:8080"
  enable_websocket: true
  websocket_address: "0.0.0.0:8081"
  request_timeout: "30s"
  max_connections: 1000

discovery:
  strategy:
    type: "Static"
  health_check_interval: "30s"
  health_check_timeout: "5s"
  static_services:
    - name: "reimbursement-agent"
      url: "http://localhost:3001"
      weight: 100
      tags: ["finance", "reimbursement"]
    - name: "chat-agent"
      url: "http://localhost:3002"
      weight: 100
      tags: ["chat", "conversation"]

load_balancing:
  strategy: "RoundRobin"
  health_check:
    interval: "30s"
    timeout: "5s"
    failure_threshold: 3
    success_threshold: 2

auth:
  enabled: false
  strategies: []
  # Example auth strategies:
  # strategies:
  #   - type: "BearerToken"
  #     tokens: ["token1", "token2"]
  #   - type: "ApiKey"
  #     keys: ["key1", "key2"]
  #   - type: "Jwt"
  #     secret: "your-jwt-secret"

monitoring:
  metrics:
    enabled: true
    bind_address: "0.0.0.0:9090"
    path: "/metrics"
  tracing:
    enabled: true
    jaeger_endpoint: null
    service_name: "a2a-gateway"

logging:
  level: "info"
  format: "text"
